<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenView</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="preview.png">

  <meta name="description" content="Strategy rooted in rich insights from Gen Z. Before anyone else." />
  <link rel="canonical" href="https://genview.uk/" />

  <!-- Open Graph -->
  <meta property="og:title" content="GenView" />
  <meta property="og:description" content="Strategy rooted in rich insights from Gen Z. Before anyone else." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://genview.uk/" />
  <meta property="og:image" content="https://genview.uk/preview.png" />
  <meta property="og:image:width" content="1500" />
  <meta property="og:image:height" content="1500" />

  <!-- Twitter / WhatsApp -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="GenView" />
  <meta name="twitter:description" content="Strategy rooted in rich insights from Gen Z. Before anyone else." />
  <meta name="twitter:image" content="https://genview.uk/preview.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background-color: #adebb3;
      font-family: 'League Spartan', sans-serif;
      color: black;
      -webkit-font-smoothing: antialiased;
    }

    html { scroll-behavior: smooth; }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
    }

    .hero h1 {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 700;
      margin: 0;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    /* SCROLL ARROW */
    .scroll-hint {
      margin: 40px auto 0;
      display: flex;
      justify-content: center;
      animation: bounce 2s infinite;
      opacity: 0.4;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: black;
      transition: opacity 0.3s ease;
    }

    .scroll-hint svg { width: 24px; height: 24px; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }

    /* CONTENT */
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 100px 24px 140px;
      text-align: center;
    }

    .tagline {
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -1px;
      opacity: 0;
      transition: opacity 1.2s ease;
      margin-bottom: 80px;
    }

    .tagline em {
      font-weight: 400;
      font-style: italic;
      color: rgba(0,0,0,0.65);
    }

    .tagline.visible { opacity: 1; }

    /* EMAIL */
    .email-title {
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    form {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input[type="email"] {
      padding: 14px 16px;
      font-size: 16px;
      font-family: inherit;
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 10px;
      width: 260px;
      background: rgba(255,255,255,0.35);
      outline: none;
    }

    button[type="submit"] {
      padding: 14px 18px;
      font-size: 16px;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button[type="submit"]:hover { opacity: 0.85; }

    #success-message {
      display: none;
      margin-top: 18px;
      font-size: 16px;
      color: rgba(0,0,0,0.75);
    }

    /* FOOTER */
    .footer {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(0,0,0,0.6);
      display: flex;
      gap: 10px;
      align-items: center;
      white-space: nowrap;
    }

    .dot { opacity: 0.35; }

    .footer-link {
      color: rgba(0,0,0,0.75);
      text-decoration: none;
      position: relative;
    }

    .footer-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.75);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s ease;
    }

    .footer-link:hover::after { transform: scaleX(1); }

    @media (max-width: 600px) {
      .footer {
        gap: 8px;
        font-size: 11px;
        bottom: 10px;
        white-space: normal;
        justify-content: center;
        width: 100%;
        left: 0;
        transform: none;
        padding: 0 16px;
        text-align: center;
        flex-wrap: wrap;
      }
      .footer-hide-mobile { display: none; }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <div class="hero">
    <h1>GenView</h1>
    <button class="scroll-hint" id="scroll-hint" aria-label="Scroll down"
      onclick="window.scrollTo({top: window.innerHeight, behavior: 'smooth'})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>
  </div>

  <!-- CONTENT -->
  <div class="wrap">

    <div class="tagline" id="tagline">
      Gen Z has opinions.<br>
      Time you heard them.<br>
      <em>Coming soon.</em>
    </div>

    <div class="email-title">Be first to know when we launch.</div>

    <form id="email-form">
      <input type="email" name="email" placeholder="Enter your email" required />
      <button type="submit">Submit</button>
    </form>

    <div id="success-message">
      Success. We'll be in touch.
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <a href="https://www.linkedin.com/company/112609480/" target="_blank" class="footer-link">LinkedIn</a>
    <span class="dot">•</span>
    <a href="https://www.instagram.com/genviewuk/" target="_blank" class="footer-link">Instagram</a>
    <span class="dot footer-hide-mobile">•</span>
    <a href="https://www.linkedin.com/in/luke-daniel-hall" target="_blank" class="footer-link footer-hide-mobile">Luke Hall</a>
    <span class="dot footer-hide-mobile">•</span>
    <span class="footer-hide-mobile">GenView Group Ltd</span>
    <span class="dot">•</span>
    <a href="privacy.html" class="footer-link">Privacy Policy</a>
  </div>

</body>

<script>
  // Email form
  const form = document.getElementById("email-form");
  const success = document.getElementById("success-message");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    const formData = new FormData(form);
    try {
      await fetch("https://script.google.com/macros/s/AKfycbzDudrRu-pavjB2wUZoiA74tYOiGO6beJxW8PdrT1XGftuunpHVInuLeJJnONl7N21m/exec", {
        method: "POST",
        body: formData
      });
      form.style.display = "none";
      success.style.display = "block";
      setTimeout(() => {
        form.style.display = "flex";
        success.style.display = "none";
        form.reset();
      }, 5000);
    } catch (err) {
      alert("Something went wrong. Please try again.");
    }
  });

  // Fade in tagline 1s after it enters view
  const tagline = document.getElementById("tagline");
  const observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        setTimeout(function() {
          tagline.classList.add("visible");
        }, 1000);
        observer.disconnect();
      }
    });
  }, { threshold: 0.3 });
  observer.observe(tagline);

  // Hide scroll hint on scroll
  const scrollHint = document.getElementById("scroll-hint");
  window.addEventListener("scroll", function() {
    scrollHint.style.opacity = window.scrollY > 40 ? "0" : "0.4";
  }, { passive: true });
</script>

</body>
</html>
