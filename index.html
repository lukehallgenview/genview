<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Open Graph (link preview) -->
  <meta property="og:title" content="GenView" />
  <meta property="og:description" content="They'll decide your future. Hear them first." />
  <meta property="og:image" content="https://lukehallgenview.github.io/genview/preview.png" />
  <meta property="og:type" content="website" />

<!-- Twitter / X preview -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://lukehallgenview.github.io/genview/preview.png" />
    <meta charset="UTF-8">
    <title>GenView</title>

  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #adebb3;
      color: black;
      font-family: 'League Spartan', sans-serif;
      text-align: center;
      min-height: 100vh;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      opacity: 0;
      animation: fadeIn 0.9s ease-out forwards;
    }

    .title {
      font-size: 96px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -1px;
      line-height: 1;
    }

    .subtitle {
      font-size: 34px;
      margin-top: 18px;
      line-height: 1.2;
      color: rgba(0, 0, 0, 0.85);
    }

    .italic {
      font-style: italic;
      margin-top: 8px;
      color: rgba(0, 0, 0, 0.75);
    }

    .footer {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: center;
      opacity: 0;
      animation: fadeInFooter 1.1s ease-out forwards;
      animation-delay: 0.2s;
    }

    .footer-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      white-space: nowrap;
    }

    .dot {
      opacity: 0.35;
    }

    .footer-link {
      color: rgba(0, 0, 0, 0.75);
      text-decoration: none;
      position: relative;
      font-weight: 500;
    }

    .footer-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 100%;
      height: 1px;
      background: rgba(0, 0, 0, 0.75);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.22s ease;
    }

    .footer-link:hover::after {
      transform: scaleX(1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -52%);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -55%);
      }
    }

    @keyframes fadeInFooter {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="content">
    <h1 class="title">GenView</h1>
    <div class="subtitle">They'll decide your future.</div>
    <div class="subtitle italic">Hear them first.</div>
  </div>

  <div class="footer">
    <div class="footer-line">
      <span>Coming soon.</span>
    </div>

    <div class="footer-line">
      <a href="https://www.linkedin.com/in/luke-daniel-hall" target="_blank" class="footer-link">
        Luke Hall
      </a>
      <span class="dot">•</span>
      <span>GenView Group Ltd</span>
    </div>
  </div>

</body>
</html>
