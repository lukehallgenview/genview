<!DOCTYPE html>
<html lang="en">
<head>
  
  <link rel="icon" type="image/png" href="/preview.png">
  <!-- Open Graph (link preview) -->
  <meta property="og:title" content="GenView" />
  <meta property="og:description" content="They'll decide your future. Hear them first." />
  <meta property="og:image" content="https://lukehallgenview.github.io/genview/preview.png" />
  <meta property="og:type" content="website" />

<!-- Twitter / X preview -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://lukehallgenview.github.io/genview/preview.png" />
    <meta charset="UTF-8">
    <title>GenView</title>

  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
  body {
    margin: 0;
    background-color: #adebb3;
    color: black;
    font-family: 'League Spartan', sans-serif;
    text-align: center;
    min-height: 100vh;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* Responsive centring (better than transform hack) */
  .content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    width: min(90vw, 800px);
  }

  .title {
    font-size: clamp(44px, 8vw, 96px);
    font-weight: 700;
    margin: 0;
    letter-spacing: -1.5px;
    line-height: 1;
  }

  .subtitle {
    font-size: clamp(18px, 3.5vw, 34px);
    margin-top: 14px;
    line-height: 1.25;
    color: rgba(0, 0, 0, 0.85);
  }

  .italic {
    font-style: italic;
    margin-top: 6px;
    color: rgba(0, 0, 0, 0.75);
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: center;
    width: min(90vw, 800px);
  }

  .footer-line {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    line-height: 1.2;
  }

  .dot {
    opacity: 0.35;
  }

  .footer-link {
    color: rgba(0, 0, 0, 0.75);
    text-decoration: none;
    position: relative;
    font-weight: 500;
  }

  .footer-link::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 100%;
    height: 1px;
    background: rgba(0, 0, 0, 0.75);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s ease;
  }

  .footer-link:hover::after {
    transform: scaleX(1);
  }
</style>
</head>

<body>

  <div class="content">
    <h1 class="title">GenView</h1>
    <div class="subtitle">They'll decide your future.</div>
    <div class="subtitle italic">Hear them first.</div>
  </div>

  <div class="footer">
    <div class="footer-line">
      <span>Coming soon.</span>
    </div>

    <div class="footer-line">
      <a href="https://www.linkedin.com/in/luke-daniel-hall" target="_blank" class="footer-link">
        Luke Hall
      </a>
      <span class="dot">•</span>
      <span>GenView Group Ltd</span>
    </div>
  </div>

</body>
</html>
