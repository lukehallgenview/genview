<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GenView — Hear them first</title>

  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #adebb3;
      color: black;
      font-family: 'League Spartan', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    html {
      scroll-behavior: smooth;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }

    .title {
      font-size: clamp(44px, 8vw, 96px);
      font-weight: 700;
      margin: 0;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .subtitle {
      font-size: clamp(18px, 3.5vw, 34px);
      margin-top: 14px;
      color: rgba(0, 0, 0, 0.85);
      line-height: 1.25;
    }

    .italic {
      font-style: italic;
      margin-top: 6px;
      color: rgba(0, 0, 0, 0.75);
    }

    /* STAT SECTION */
    .section {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 24px;
    }

    .stat {
      font-size: clamp(22px, 3.5vw, 42px);
      max-width: 900px;
      line-height: 1.25;
      font-weight: 500;
    }

    /* EMAIL SECTION */
    .email-section {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 0 24px;
      text-align: center;
    }

    .label {
      font-size: 18px;
      margin-bottom: 14px;
      color: rgba(0, 0, 0, 0.75);
    }

    .email-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input[type="email"] {
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      outline: none;
      width: 260px;
      background: rgba(255,255,255,0.35);
    }

    button {
      padding: 14px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    /* Mobile polish */
    @media (max-width: 600px) {
      input[type="email"] {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <div>
      <h1 class="title">GenView</h1>
      <div class="subtitle">They'll decide your future.</div>
      <div class="subtitle italic">Hear them first.</div>
    </div>
  </div>

  <!-- STAT -->
  <div class="section">
    <div class="stat">
      90% of UK Gen Z expect brands to demonstrate genuine purpose beyond profit
    </div>
  </div>

  <!-- EMAIL -->
  <div class="email-section">
    <div class="label">Stay in touch</div>

    <form class="email-box" action="https://script.google.com/macros/s/AKfycbzz1ccaJ6EBPutX4hRooBo5ij1YpCHYNHWd0Gf8xW7p22Ay2Q9exrdK_IwHEDp7ho6C/exec" method="POST">
      <input type="email" name="email" placeholder="Enter your email" required />
      <button type="submit">Join</button>
    </form>
  </div>

</body>
</html>
