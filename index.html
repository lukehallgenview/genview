<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GenView</title>

  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #adebb3;
      font-family: 'League Spartan', sans-serif;
      color: black;
      -webkit-font-smoothing: antialiased;
    }

    html {
      scroll-behavior: smooth;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 120px 24px;
      text-align: center;
    }

    .block {
      margin-bottom: 140px;
    }

    .title {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 700;
      margin: 0;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .subtitle {
      font-size: clamp(18px, 3vw, 32px);
      margin-top: 12px;
      line-height: 1.2;
    }

    .italic {
      font-style: italic;
      margin-top: 6px;
      color: rgba(0,0,0,0.75);
    }

    .stat {
      font-size: clamp(22px, 3.2vw, 40px);
      line-height: 1.25;
      font-weight: 500;
    }

    .source {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(0,0,0,0.55);
    }

    .email-title {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 700;
      margin-bottom: 18px;
      letter-spacing: -1px;
    }

    form {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input[type="email"] {
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 10px;
      width: 260px;
      background: rgba(255,255,255,0.35);
      outline: none;
    }

    button {
      padding: 14px 18px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    /* SUCCESS STATE */
    #success-message {
      display: none;
      margin-top: 18px;
      font-size: 16px;
      color: rgba(0,0,0,0.75);
    }

    /* FOOTER */
    .footer {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(0,0,0,0.6);
      display: flex;
      gap: 10px;
      align-items: center;
      white-space: nowrap;
    }

    .dot { opacity: 0.35; }

    .footer-link {
      color: rgba(0,0,0,0.75);
      text-decoration: none;
      position: relative;
    }

    .footer-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.75);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s ease;
    }

    .footer-link:hover::after {
      transform: scaleX(1);
    }
  </style>
</head>

<body>

<div class="wrap">

  <!-- HERO -->
  <div class="block">
    <h1 class="title">GenView</h1>
    <div class="subtitle">They'll decide your future.</div>
    <div class="subtitle italic">Hear them first.</div>
  </div>

  <!-- STAT -->
  <div class="block">
    <div class="stat">
      90% of UK Gen Z expect brands to demonstrate genuine purpose beyond profit.
    </div>
    <div class="source">(Dentsu UK, 2024)</div>
  </div>

  <!-- EMAIL -->
  <div class="block">
    <div class="email-title">Stay in touch</div>

    <form id="email-form">
      <input type="email" name="email" placeholder="Enter your email" required />
      <button type="submit">Submit</button>
    </form>

    <div id="success-message">
      Success. We’ll be in touch.
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <span>Coming soon.</span>
  <span class="dot">•</span>

  <a href="https://www.linkedin.com/in/luke-daniel-hall" target="_blank" class="footer-link">
    Luke Hall
  </a>

  <span class="dot">•</span>
  <span>GenView Group Ltd</span>
</div>

<!-- JS -->
<script>
  const form = document.getElementById("email-form");
  const success = document.getElementById("success-message");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(form);

    try {
      await fetch("https://script.google.com/macros/s/AKfycbya4q2PNhbW0CnlY9DDe2OTI7ZXEfEzjfRc8jhVs1ZT0aSPY2ipuWT4JHaAeCnGbzZJ/exec", {
        method: "POST",
        body: formData
      });

      form.style.display = "none";
      success.style.display = "block";

      // optional: auto-reset after 5 seconds
      setTimeout(() => {
        form.style.display = "flex";
        success.style.display = "none";
        form.reset();
      }, 5000);

    } catch (err) {
      alert("Something went wrong. Please try again.");
    }
  });
</script>

</body>
</html>
