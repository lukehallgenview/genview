<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GenView</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #adebb3;
      color: black;
      font-family: 'League Spartan', sans-serif;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      position: relative;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .title {
      font-size: 100px;
      font-weight: 700;
      margin: 0;
    }

    .subtitle {
      font-size: 36px;
      margin-top: 20px;
    }

    .italic {
      font-style: italic;
      margin-top: 10px;
    }

    /* Footer (Apple / Stripe style) */
    .footer {
      position: absolute;
      bottom: 18px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(0, 0, 0, 0.65);
      letter-spacing: 0.2px;
    }

    .footer span {
      font-weight: 400;
    }

    .dot {
      opacity: 0.4;
    }

    .footer-link {
      color: rgba(0, 0, 0, 0.75);
      text-decoration: none;
      position: relative;
      font-weight: 400;
    }

    /* subtle animated underline (Stripe-style) */
    .footer-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 100%;
      height: 1px;
      background: rgba(0, 0, 0, 0.75);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s ease;
    }

    .footer-link:hover::after {
      transform: scaleX(1);
    }
  </style>
</head>

<body>
  <div class="content">
    <h1 class="title">GenView</h1>
    <div class="subtitle">They'll decide your future.</div>
    <div class="subtitle italic">Hear them first.</div>
  </div>

  <div class="footer">
    <span>Coming soon</span>
    <span class="dot">•</span>

    <a href="https://www.linkedin.com/in/luke-daniel-hall" target="_blank" class="footer-link">
      Luke Hall
    </a>

    <span class="dot">•</span>
    <span>GenView Group Ltd 2026</span>
  </div>
</body>

</html>
