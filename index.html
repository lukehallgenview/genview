<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GenView</title>

  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #adebb3;
      color: black;
      font-family: 'League Spartan', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    html {
      scroll-behavior: smooth;
    }

    /* Shared section style */
    section {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 24px;
    }

    /* HERO */
    .hero h1 {
      font-size: clamp(44px, 8vw, 96px);
      font-weight: 700;
      margin: 0;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .hero p {
      font-size: clamp(18px, 3.2vw, 32px);
      margin-top: 12px;
      line-height: 1.2;
    }

    .hero em {
      display: block;
      margin-top: 6px;
      font-style: italic;
      color: rgba(0,0,0,0.75);
    }

    /* STORY */
    .story {
      font-size: clamp(20px, 3.5vw, 42px);
      max-width: 900px;
      line-height: 1.25;
      font-weight: 500;
    }

    /* EMAIL */
    .email-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .email-title {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 700;
      letter-spacing: -1px;
    }

    form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input[type="email"] {
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      width: 260px;
      background: rgba(255,255,255,0.35);
      outline: none;
    }

    button {
      padding: 14px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    /* subtle fade-in on scroll (progressive enhancement) */
    section {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 0.8s ease forwards;
    }

    section:nth-child(1) { animation-delay: 0.1s; }
    section:nth-child(2) { animation-delay: 0.2s; }
    section:nth-child(3) { animation-delay: 0.3s; }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      input[type="email"] {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <div>
      <h1>GenView</h1>
      <p>They'll decide your future.</p>
      <em>Hear them first.</em>
    </div>
  </section>

  <!-- STORY / INSIGHT -->
  <section>
    <div class="story">
      90% of UK Gen Z expect brands to demonstrate genuine purpose beyond profit
    </div>
  </section>

  <!-- EMAIL -->
  <section>
    <div class="email-wrap">
      <div class="email-title">Stay in touch</div>

      <form action="PASTE_YOUR_SCRIPT_URL_HERE" method="POST">
        <input type="email" name="email" placeholder="Enter your email" required />
        <button type="submit">Submit</button>
      </form>
    </div>
  </section>

</body>
</html>
